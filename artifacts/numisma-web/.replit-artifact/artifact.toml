kind = "web"
previewPath = "/numisma-web/"
title = "Numisma Premium Web"
version = "1.0.0"
id = "artifacts/numisma-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/numisma-web/" ]
localPort = 26208

[services.development]
run = "pnpm --filter @workspace/numisma-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/numisma-web", "run", "build" ]
publicDir = "artifacts/numisma-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26208"
BASE_PATH = "/numisma-web/"
